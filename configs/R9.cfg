!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R9
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
key chain jonty
 key 1
   key-string Tbx-9041
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex half
!
interface FastEthernet1/0
 ip address 200.0.0.19 255.255.255.248
 ip rip send version 2
 ip rip receive version 2
 ip rip authentication key-chain jonty
 duplex auto
 speed auto
!
interface FastEthernet1/1
 ip address 200.0.0.34 255.255.255.248
 ip rip send version 2
 duplex auto
 speed auto
!
!
router rip
 passive-interface FastEthernet1/1
 network 200.0.0.0
 neighbor 200.0.0.33
 neighbor 200.0.0.37
 no auto-summary
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
control-plane
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
